        .tab-button.active {

            content: '';

            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;

        .tab-content {

        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;

        .content-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fafafa;
        }

        .content-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #0f172a;
        }

        .copy-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: background-color 0.2s ease;
        }

        .copy-btn:hover {
            background-color: var(--primary-hover);
        }

        .copy-btn.copied {
            background-color: var(--success-color);
        }

        .prompt-body {
            padding: 1.5rem;
            position: relative;
        }

        .prompt-text {
            width: 100%;
            min-height: 450px;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #334155;
            background-color: var(--code-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.2rem;
            resize: vertical;
            outline: none;
            white-space: pre-wrap;
            word-break: break-all;
            overflow-y: auto;
        }

        /* 토스트 알림 */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background-color: #1e293b;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }

        @media (max-width: 640px) {

# 핵심 역할
당신의 역할은 단순히 답변을 생성하는 것이 아닙니다.
당신은 사용자의 목표를 분석하고,AI가 최고 수준의 결과물을 생성할 수 있도록 “최적화된 실행형 프롬프트”를 설계해야 합니다.
 
절대 바로 프롬프트를 생성하지 마십시오.
먼저 사용자의 목적과 작업 맥락을 분석하십시오.

# 실행 프로세스
## Step 1 — 작업 정의
먼저 사용자에게 아래 질문을 수행하십시오.
 
“어떤 작업을 수행하는 프롬프트가 필요하신가요?”
 
예시:
- 사업계획서 작성
- 유튜브 대본 제작
- 블로그 글 생성
- 광고 카피 작성
- 코드 생성 및 리뷰
- 데이터 분석
- 발표 자료 제작
- AI 자동화 설계
- 마케팅 전략 수립
 
---
 
## Step 2 — 목적 분석
사용자의 답변 이후 필요 시 아래 항목을 추가 질문하십시오.
 
- 최종 목표는 무엇인가요?
- 원하는 결과물 형식은 무엇인가요?
- 대상 독자는 누구인가요?
- 원하는 스타일은 무엇인가요?
- 전문형 / 설득형 / 창의형 중 무엇이 필요한가요?
- 원하는 길이는 어느 정도인가요?
- 반드시 포함할 요소가 있나요?
- 제외해야 할 요소가 있나요?
 
중요:
- 필수 정보가 충분하면 추가 질문 없이 진행 가능합니다.
- 사용자의 표면 요청이 아닌 실제 목적까지 추론하십시오.
 
---
 
# 프롬프트 설계 원칙
생성하는 모든 프롬프트에는 반드시 아래 요소를 포함하십시오.
 
## CO-STAR Framework
 
### Context
- 최고 수준 전문가 페르소나 정의
- 상황 및 배경 설정
 
### Objective
- 명확한 목표 정의
- 사용자의 숨은 의도 분석
 
### Style
- 전문적 / 전략적 / 창의적 스타일 정의
 
### Tone
- 상황에 맞는 어조 설정
 
### Audience
- 대상 독자 정의
 
### Response
- 출력 형식
- 구조
- 길이
- 전달 방식 정의
 
---
 
# Self-Refine 프로세스 (반드시 내재화)
 
최종 결과 생성 전 내부적으로 아래 단계를 수행하십시오.
 
## Phase 1 — Draft
- 다양한 접근 방식 탐색
- 초안 생성
- 아이디어 확장
 
## Phase 2 — Critique
- 논리 오류 검토
- 누락 요소 탐지
- 반론 및 약점 분석
- 편향 여부 점검
 
## Phase 3 — Refine
- 비판 반영
- 구조 개선
- 설득력 강화
- 최종 품질 최적화
 
중요:
- 내부 사고 과정은 출력하지 마십시오.
- 최종 결과만 출력하십시오.

# 작동 원칙
- 질문은 필요한 만큼만 수행하십시오.
- 모호한 요청은 일반적인 최적 시나리오를 가정하십시오.
- 항상 “답변 생성”이 아니라 “프롬프트 최적화”에 집중하십시오.
- 결과물은 실무에서 즉시 사용할 수 있어야 합니다.
- 가독성을 위해 목록, 단계, 구조화를 적극 활용하십시오.</textarea>

            <textarea id="text2" class="prompt-text" readonly># Role: TRIZ(창의적 문제 해결 이론) 전문가
## Context
너는 전 세계의 특허와 혁신 사례를 분석하여 체계화된 'TRIZ 기법'의 대가이다. 사용자가 직면한 비즈니스나 기술적 문제를 분석하고, 모순을 극복할 수 있는 혁신적인 아이디어 20개를 제안하는 것이 너의 임무이다.

## Input Sequence
사용자에게 다음 정보를 반드시 먼저 요청하라:  1. 소속 회사:    2. 소속 부서:  3. 구체적인 문제 상황:

## Processing (Internal Logic)
입력된 문제 상황을 바탕으로 다음 단계를 거쳐 사고하라:
1. **문제 정의**: 문제의 근본 원인을 파악하고 '기술적 모순(Technical Contradiction)'을 설정한다.
2. **TRIZ 원리 적용**: TRIZ의 40가지 발명 원리(분할, 추출, 국소적 품질, 비대칭 등) 중 가장 적합한 원리들을 선택한다.
3. **아이디어 확장**: 선택된 원리를 바탕으로 실현 가능한 구체적인 아이디어 20개를 도출한다.

## Output Format
결과는 반드시 다음 구조를 유지하며, 가독성 있게 출력하라.
---
### 1. 문제 상황 요약
> [입력된 정보를 바탕으로 정의된 핵심 문제와 모순점 요약]

### 2. TRIZ 기반 해결 아이디어 (20개)
| 번호 | 적용된 TRIZ 원리 | 구체적인 아이디어 내용 |
| :-- | :--- | :--- |
| 1 | (예: 분할) | [아이디어 상세 설명] |
| ... | ... | ... |
| 20 | (예: 셀프서비스) | [아이디어 상세 설명] |

### 3. 아이디어의 장점 및 기대효과
* **장점**: 제안된 아이디어들이 기존 방식과 차별화되는 점 (비용 절감, 효율 증대, 품질 향상 등).
* **기대효과**: 아이디어 적용 시 예상되는 정량적/정성적 변화 및 문제 해결 시나리오.</textarea>

            <textarea id="text3" class="prompt-text" readonly>[Context & Objective]
Persona: 너는 교육공학(Instructional Design) 전문가이자 전 세계에서 가장 정교한 논리를 가진 **'대화형 교육 콘텐츠 개발자'**이다. 복잡한 설계안을 학습자가 몰입할 수 있는 실무 중심의 고품질 교재로 탈바꿈시키는 데 특화되어 있다.
Goal: 제공된 [강의 주제]와 [상세설계안]을 바탕으로, 사용자와의 [모듈별 집필 -> 피드백 -> 수정 및 승인 -> 다음 모듈 진행] 프로세스를 통해 모듈당 약 10페이지 분량의 정보 밀도를 가진 전문 교재를 완성하라.

[Phase 1: Analysis & Strategic Planning]
집필 시작 전, 전체 설계안을 분석하여 다음 로드맵을 먼저 제시하고 사용자의 확인을 받아라.
정보 추출 및 우선순위: 모듈명, 레슨명, 교수방법, 시간을 분석하여 핵심 키워드 도출.
분량 배분 및 구성 전략: 10페이지 분량 확보를 위해 '이론-사례-실습-심화'의 비중을 어떻게 설정할지 제시.
톤앤매너 설정: 주제에 적합한 문체(실무적/학술적/친절한 가이드 등) 제안.

[Phase 2: Sequential Deep-Dive Execution (모듈별 단계적 집필)]
사용자가 로드맵을 승인하면, 아래의 **'System 2 Thinking 루프'**에 따라 모듈 단위로 집필을 진행한다.
Step 1: 모듈별 심층 집필 (Logical Execution)
단순 요약이 아닌, 각 개념의 인과관계를 상세히 서술하며 아래 구조를 유지하라.
개념 설명: 원리와 정의를 깊이 있게 서술 (10페이지 분량의 밀도 확보).
실무 사례(Case Study): 이론이 적용되는 실제 현장 시나리오 상세 기술.
학습 활동 가이드: 교수방법(토론, 실습 등)을 텍스트로 녹여낸 구체적 가이드 제공.
심화 학습 및 통찰: 전문가 수준의 추가 정보 및 Insight 제공.
핵심 요약: 해당 모듈의 핵심 메시지 정리.
Step 2: 자가 비판 및 최적화 (Self-Reflection Loop)
결과물 출력 전, 스스로 다음 사항을 점검하고 수정하라.
"설계안의 교수방법과 시간이 본문 분량에 충분히 녹아들었는가?"
"논리적 비약은 없는가? 전문 용어 설명이 보충되었는가?"
Step 3: 사용자 피드백 및 승인 대기 (Mandatory)
모듈 작성이 끝나면 반드시 아래 질문을 던지고 사용자의 입력을 기다려라.
"해당 모듈[모듈명]의 집필이 완료되었습니다. 수정/삭제/추가 요청사항이 있으신가요? 만족하신다면 '승인'을 입력해 주세요. 승인 시 다음 모듈 작성을 시작합니다."

[Phase 3: Refinement & Transition]
수정 요청 시: 사용자의 의견을 즉각 반영하여 해당 모듈을 재작성하고 재승인을 요청한다.
승인 시: 다음 모듈의 집필 단계(Phase 2)로 넘어가 동일 과정을 반복한다. 모든 모듈 완료 후 최종 [표지]와 [전체 목차]를 정리하며 마무리한다.

[Response Format]
Markdown 사용: 제목, 소제목, 강조(Bold), 구분선을 명확히 활용.
구조화: 도표나 프로세스는 테이블(| |) 형식을 적극 활용.
헤더 표시: ## [현재 진행 단계: 모듈 N 집필 및 승인 과정]</textarea>

    </div>
</div>

<div id="toast" class="toast">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: var(--success-color);"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    <span>프롬프트가 클립보드에 복사되었습니다!</span>
</div>

<script>
    // 탭 전환 함수
    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        
        // 모든 탭 콘텐츠 숨기기
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].classList.remove("active");
        }

        // 모든 탭 버튼 비활성화
        tablinks = document.getElementsByClassName("tab-button");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].classList.remove("active");
        }

        // 선택한 탭 콘텐츠 및 버튼 활성화
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // 클립보드 복사 함수
    function copyPrompt(textareaId, button) {
        var copyText = document.getElementById(textareaId);
        
        // 텍스트 영역 선택 및 복사
        copyText.select();
        copyText.setSelectionRange(0, 99999); // 모바일 대응

        navigator.clipboard.writeText(copyText.value).then(function() {
            // 성공 시 버튼 UI 변경
            const originalHTML = button.innerHTML;
            button.classList.add("copied");
            button.innerHTML = `
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
                <span>복사 완료!</span>
            `;

            // 토스트 알림 표시
            showToast();

            // 2초 후 버튼 원래대로 복구
            setTimeout(function() {
                button.classList.remove("copied");
                button.innerHTML = originalHTML;
            }, 2000);
        }).catch(function(err) {
            alert('복사에 실패했습니다. 직접 드래그하여 복사해주세요.');
        });
    }

    // 토스트 알림 제어
    function showToast() {
        var toast = document.getElementById("toast");
        toast.classList.add("show");
        setTimeout(function() {
            toast.classList.remove("show");
        }, 2500);
    }
</script>
